steps:

  # ── Step 1: upload static files to GCS ──────────────────────────────────────
  # collectstatic runs here (in CI), NOT inside the container at boot.
  # This keeps startup fast and the image free of static files.
  # Cloud Build uses ADC (Application Default Credentials) automatically.
  - name: 'python:3.12-alpine'
    id: collectstatic
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        pip install -r requirements.txt -q --no-cache-dir
        python manage.py collectstatic --noinput
    env:
      - 'GS_BUCKET_NAME=${_GS_BUCKET_NAME}'
      - 'SECRET_KEY=${_SECRET_KEY}'
      - 'DEBUG=False'
      - 'ALLOWED_HOSTS=localhost'
      - 'DATABASE_URL=${_DATABASE_URL}'

  # ── Step 2: build Docker image ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nsog:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nsog:latest'
      - '.'

  # ── Step 3: push image to Artifact Registry ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nsog'

  # ── Step 4: deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nsog'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nsog:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'

  # ── Step 5: create / update Cloud Run Job for monthly news cleanup ───────────
  # Cloud Scheduler triggers this job on the 1st of each month (one-time setup).
  # Cron expression: 0 0 1 * *  (midnight UTC, 1st of month)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: update-cleanup-job
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nsog:$BUILD_ID"
        ENV_VARS="DATABASE_URL=${_DATABASE_URL},SECRET_KEY=${_SECRET_KEY},DEBUG=False,ALLOWED_HOSTS=localhost,GS_MEDIA_BUCKET_NAME=${_GS_MEDIA_BUCKET_NAME}"

        if gcloud run jobs describe cleanup-old-news --region=${_REGION} --quiet 2>/dev/null; then
          gcloud run jobs update cleanup-old-news \
            --image="$$IMAGE" \
            --region=${_REGION} \
            --update-env-vars="$$ENV_VARS" \
            --quiet
        else
          gcloud run jobs create cleanup-old-news \
            --image="$$IMAGE" \
            --region=${_REGION} \
            --command=python \
            --args="manage.py,delete_old_news" \
            --set-env-vars="$$ENV_VARS" \
            --quiet
        fi

substitutions:
  _REGION: europe-west1
  _REPO: nsog-repo
  _GS_BUCKET_NAME: nsogcip-static
  _GS_MEDIA_BUCKET_NAME: nsogcip-media
  _CLOUDRUN_HOST: nsog-1027869050079.europe-west1.run.app
  _DEFAULT_FROM_EMAIL: N.S.O.G. <nsogcip@gmail.com>
  _DISCORD_URL: https://discord.gg/rxBf8D4x6P
  _INSTAGRAM_URL: https://www.instagram.com/nsog_airsoft/
  _FACEBOOK_URL: https://www.facebook.com/profile.php?id=61590260228364
  # ── Sensitive values: leave empty here, set in the Cloud Build Trigger UI ──
  _SECRET_KEY: ''
  _DATABASE_URL: ''
  _EMAIL_HOST_USER: ''
  _EMAIL_HOST_PASSWORD: ''

options:
  logging: CLOUD_LOGGING_ONLY
