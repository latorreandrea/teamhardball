{% extends "base.html" %}
{% load static %}

{% block title %}Slet {{ item.name }} | Våbenkammer | N.S.O.G.{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container" style="max-width:520px;">

        <div class="armoury-form-card text-center">
            <div class="mb-3" style="font-size:3rem; color:var(--color-danger, #e53935);">
                <i class="fas fa-triangle-exclamation"></i>
            </div>
            <h2 class="h4 mb-2">Er du sikker?</h2>
            <p class="text-muted mb-4">
                Du er ved at slette <strong>{{ item.name }}</strong> fra våbenkammeret.
                Denne handling kan ikke fortrydes.
            </p>

            <div class="d-flex justify-content-center gap-3">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">
                        <i class="fas fa-trash me-1"></i>Ja, slet det
                    </button>
                </form>
                <a href="{% url 'armoury:equipment_detail' item.pk %}" class="btn btn-outline-secondary btn-sm">
                    Annuller
                </a>
            </div>
        </div>

    </div>
</section>
{% endblock %}
