<div class="alert alert-warning alert-dismissible fade show shadow-sm mb-2 toast-warning-custom" role="alert">
    <i class="fas fa-exclamation-circle me-2"></i>
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<style>
.toast-warning-custom {
    background: linear-gradient(135deg, rgba(255, 193, 7, 0.95), rgba(224, 168, 0, 0.95));
    border: 1px solid rgba(255, 193, 7, 0.8);
    color: #1a1a1a;
    border-radius: var(--radius-md);
    animation: slideInDown 0.4s ease-out;
}

.toast-warning-custom .btn-close {
    filter: brightness(0);
    opacity: 0.7;
}
</style>
