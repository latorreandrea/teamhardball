{% extends "base.html" %}
{% load static %}

{% block title %}Logout | N.S.O.G.{% endblock %}

{% block content %}
<section class="auth-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-sign-out-alt fa-3x mb-3" style="color: var(--color-primary);"></i>
                        <h1 class="h3 fw-bold mb-2">LOG UD?</h1>
                        <p class="text-muted">Er du sikker på, at du vil logge ud?</p>
                    </div>

                    <form method="POST" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        
                        <button type="submit" class="btn btn-brand w-100 mb-3">
                            <i class="fas fa-sign-out-alt me-2"></i>Ja, log ud
                        </button>
                        
                        <a href="/" class="btn btn-outline-secondary w-100">
                            <i class="fas fa-times me-2"></i>Annuller
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
.auth-section {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
}

.auth-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
}

.btn-outline-secondary {
    border-color: var(--color-border);
    color: var(--color-muted);
}

.btn-outline-secondary:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--color-primary);
    color: var(--color-text);
}
</style>
{% endblock %}
