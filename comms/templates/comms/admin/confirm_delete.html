{% extends 'base.html' %}
{% load static %}

{% block title %}Admin – Slet {{ type }} | N.S.O.G.{% endblock %}

{% block content %}
<section class="py-5">
<div class="container" style="max-width:560px;">

    <div class="card border-danger">
        <div class="card-header bg-danger text-white fw-bold">
            <i class="fas fa-exclamation-triangle me-2"></i>Bekræft sletning
        </div>
        <div class="card-body p-4">
            <p>Er du sikker på, at du vil slette denne <strong>{{ type }}</strong>?</p>
            <p class="fw-semibold fs-5">"{{ object.title }}"</p>
            <p class="text-danger small">Denne handling kan ikke fortrydes.</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-1"></i>Ja, slet
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Annuller</a>
                </div>
            </form>
        </div>
    </div>

</div>
</section>
{% endblock %}
